# Konfigurasi ros_gz_bridge (ROS 2 Humble <-> Gazebo Fortress).
#
# KONTRAK INTERFACE ROV HYDROships (Milestone 1). Lihat docs/ARCHITECTURE.md.
#
# Catatan: nama gz_topic_name untuk thruster mengikuti elemen <topic> pada
# plugin Thruster di hydroships_description. Jika bridge tidak nyambung,
# jalankan `gz topic -l` saat sim hidup untuk melihat nama topik aktual,
# lalu samakan di file ini.

# ---- Clock (sinkron waktu sim -> ROS) ----
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ---- Odometry ROV (pose & twist) : Gazebo -> ROS ----
- ros_topic_name: "/hydroships/odom"
  gz_topic_name: "/model/hydroships/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ---- Sensor Milestone 3 (Gazebo -> ROS) ----
# IMU (imu_link)
- ros_topic_name: "/hydroships/imu"
  gz_topic_name: "/hydroships/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# Kamera depan (haluan)
- ros_topic_name: "/hydroships/camera_front/image_raw"
  gz_topic_name: "/hydroships/camera_front/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# Kamera bawah (dasar kolam / QR)
- ros_topic_name: "/hydroships/camera_bottom/image_raw"
  gz_topic_name: "/hydroships/camera_bottom/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# CameraInfo (intrinsics) — gz menerbitkan otomatis di sibling '<...>/camera_info'
# (leaf 'image' diganti 'camera_info'). Dibutuhkan visual servo / PBVS.
# Jika tak nyambung, cek nama aktual dgn `gz topic -l` saat sim hidup lalu samakan.
- ros_topic_name: "/hydroships/camera_front/camera_info"
  gz_topic_name: "/hydroships/camera_front/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

- ros_topic_name: "/hydroships/camera_bottom/camera_info"
  gz_topic_name: "/hydroships/camera_bottom/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# ---- Perintah gaya per thruster (N) : ROS -> Gazebo ----
- ros_topic_name: "/hydroships/thruster_1/thrust"
  gz_topic_name: "/hydroships/thruster_1/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/thruster_2/thrust"
  gz_topic_name: "/hydroships/thruster_2/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/thruster_3/thrust"
  gz_topic_name: "/hydroships/thruster_3/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/thruster_4/thrust"
  gz_topic_name: "/hydroships/thruster_4/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/thruster_5/thrust"
  gz_topic_name: "/hydroships/thruster_5/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/thruster_6/thrust"
  gz_topic_name: "/hydroships/thruster_6/thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# ---- Manipulator (rancang ulang M5): DetachableJoint + jari kosmetik ----
# Target sudut jari kosmetik (rad) : ROS -> Gazebo (JointPositionController).
- ros_topic_name: "/hydroships/gripper_jaw/cmd"
  gz_topic_name: "/hydroships/gripper_jaw/cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

# Trigger GRASP FISIK DetachableJoint (attach/detach) : ROS -> Gazebo.
# gripper_controller menerbitkan std_msgs/Empty; plugin DetachableJoint di URDF
# mendengarkan gz.msgs.Empty pada topik yg sama.
- ros_topic_name: "/hydroships/gripper/attach"
  gz_topic_name: "/hydroships/gripper/attach"
  ros_type_name: "std_msgs/msg/Empty"
  gz_type_name: "gz.msgs.Empty"
  direction: ROS_TO_GZ

- ros_topic_name: "/hydroships/gripper/detach"
  gz_topic_name: "/hydroships/gripper/detach"
  ros_type_name: "std_msgs/msg/Empty"
  gz_type_name: "gz.msgs.Empty"
  direction: ROS_TO_GZ
