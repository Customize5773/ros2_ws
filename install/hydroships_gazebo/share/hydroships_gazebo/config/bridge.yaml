# Konfigurasi ros_gz_bridge (ROS 2 Humble <-> Gazebo Fortress).
#
# KONTRAK INTERFACE ROV HYDROships (Milestone 1). Lihat docs/ARCHITECTURE.md.
#
# Catatan: nama gz_topic_name untuk thruster mengikuti elemen <topic> pada
# plugin Thruster di hydroships_description. Jika bridge tidak nyambung,
# jalankan `gz topic -l` saat sim hidup untuk melihat nama topik aktual,
# lalu samakan di file ini.

# ---- Clock (sinkron waktu sim -> ROS) ----
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ---- Odometry ROV (pose & twist) : Gazebo -> ROS ----
- ros_topic_name: "/hydroships/odom"
  gz_topic_name: "/model/hydroships/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# ---- Sensor Milestone 3 (Gazebo -> ROS) ----
# IMU (imu_link)
- ros_topic_name: "/hydroships/imu"
  gz_topic_name: "/hydroships/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# Kamera depan (haluan)
- ros_topic_name: "/hydroships/camera_front/image_raw"
  gz_topic_name: "/hydroships/camera_front/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# Kamera bawah (dasar kolam / QR)
- ros_topic_name: "/hydroships/camera_bottom/image_raw"
  gz_topic_name: "/hydroships/camera_bottom/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

